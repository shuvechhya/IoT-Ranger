version: '3.8'

services:
  backend:
    build: .
    ports: ["8000:8000"]
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - EMQX_API_URL=http://emqx:18083
      - EMQX_USER=admin
      - EMQX_PASS=public
      - MQTT_BROKER=emqx
      - MQTT_PORT=1883
      - BACKEND_MQTT_USER=backend
      - BACKEND_MQTT_PASS=backend_secret_pass_123
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - WEBHOOK_SECRET=my-webhook-secret-key-123
    networks:
      - iot-net
    depends_on:
      - mongo
      - emqx

  emqx:
    image: emqx/emqx:5.6
    ports: ["1883:1883", "8083:8083", "18083:18083"]
    volumes:
      - ./emqx.conf:/opt/emqx/etc/emqx.conf:ro
    networks:
      - iot-net

  mongo:
    image: mongo:4.4
    networks:
      - iot-net

  frontend:
    image: nginx:alpine
    ports: ["3000:80"]
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - iot-net

networks:
  iot-net:
    driver: bridge
