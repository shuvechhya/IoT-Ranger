version: "3.8"

services:
  backend:
    build: .
    ports: ["3000:3000"]
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - EMQX_API_URL=http://emqx:9095
      - EMQX_USER=admin
      - EMQX_PASS=public
      - MQTT_BROKER=emqx
      - MQTT_PORT=1883
      - BACKEND_MQTT_USER=backend
      - BACKEND_MQTT_PASS="Q5F_PX1H7R0`#sk<hXN*yFt!kBJckj"
      - JWT_SECRET="K^P6*@=Ygn2'Y2hgI2[I3j2/10^v"r/J7}5,5b:"
      - WEBHOOK_SECRET="Ur8G/T"d%P$JuQ-/9+j[Z3#Co5(QA2<sr)s)FL^"
    networks:
      - iot-net
    depends_on:
      - mongo
      - emqx

  emqx:
    image: emqx/emqx:5.6
    ports: ["1883:1883", "8083:8083", "9095:9095", "9096:9096"]
    volumes:
      - ./emqx.conf:/opt/emqx/etc/emqx.conf:ro
    environment:
      - EMQX_NAME=emqx
      - EMQX_HOST=0.0.0.0
      - EMQX_DASHBOARD__PORT=10000
    networks:
      - iot-net

  mongo:
    image: mongo:4.4
    ports: ["28017:27017"]
    networks:
      - iot-net

  frontend:
    image: nginx:alpine
    ports: ["3100:80"]
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - iot-net

networks:
  iot-net:
    driver: bridge
